name: Dependency Management

on:
  push:
    branches: [main, master]
    paths:
      - 'Cargo.toml'
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - 'landing/package.json'
      - 'landing/package-lock.json'
      - 'desktop-client/package.json'
      - 'desktop-client/package-lock.json'
  pull_request:
    branches: [main, master]
    paths:
      - 'Cargo.toml'
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - 'landing/package.json'
      - 'landing/package-lock.json'
      - 'desktop-client/package.json'
      - 'desktop-client/package-lock.json'
  schedule:
    # weekly runs on Mondays to check for outdated dependencies is best practice for nozy.
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-npm-landing:
    name: NPM Audit (Landing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        working-directory: landing
        run: npm ci

      - name: Run npm audit
        working-directory: landing
        run: npm audit --audit-level=moderate

  audit-npm-desktop:
    name: NPM Audit (Desktop Client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-client/package-lock.json

      - name: Install dependencies
        working-directory: desktop-client
        run: npm ci

      - name: Run npm audit
        working-directory: desktop-client
        run: npm audit --audit-level=moderate

  check-lockfile:
    name: Verify Cargo.lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify root Cargo.lock is up to date
        run: |
          cargo generate-lockfile
          if ! git diff --exit-code -- Cargo.lock; then
            echo "❌ Root Cargo.lock is out of date. Run 'cargo generate-lockfile' and commit Cargo.lock."
            exit 1
          fi
          echo "✅ Root Cargo.lock is up to date"

      - name: Verify desktop-client (Tauri) Cargo.lock is up to date
        run: |
          cd desktop-client/src-tauri && cargo generate-lockfile
          if ! git diff --exit-code -- desktop-client/src-tauri/Cargo.lock; then
            echo "❌ desktop-client/src-tauri/Cargo.lock is out of date. Run 'cargo generate-lockfile' there and commit."
            exit 1
          fi
          echo "✅ desktop-client/src-tauri/Cargo.lock is up to date"

  audit-dependencies:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit
        continue-on-error: false

      - name: Generate audit report
        if: failure()
        run: |
          echo "## 🔒 Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Security vulnerabilities were found. Review and fix before merging." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run \`cargo audit\` locally to see details." >> $GITHUB_STEP_SUMMARY
          cargo audit >> $GITHUB_STEP_SUMMARY || true

  check-outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-outdated
        run: cargo install cargo-outdated --locked

      - name: Check for outdated dependencies
        run: cargo outdated --exit-code 1
        continue-on-error: true

      - name: Generate outdated report
        if: failure()
        run: |
          echo "## 📦 Outdated Dependencies Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Some dependencies have newer versions available. Review and update as needed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run \`cargo outdated\` locally to see details." >> $GITHUB_STEP_SUMMARY
          cargo outdated >> $GITHUB_STEP_SUMMARY || true

  check-licenses:
    name: Check Dependency Licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny check licenses
        continue-on-error: true

