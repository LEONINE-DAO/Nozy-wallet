name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            .
            zeaking
            api-server

      # Strict on workspace members that are clippy-clean. `nozy` is excluded from `-D warnings`
      # until a dedicated cleanup lands (see PRODUCTION_CHECKLIST.md).
      - name: Clippy (zeaking, strict)
        run: cargo clippy -p zeaking --all-targets --all-features -- -D warnings

      - name: Clippy (nozywallet-api, strict, no-deps)
        run: cargo clippy -p nozywallet-api --all-targets --all-features --no-deps -- -D warnings

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            .
            zeaking
            api-server

      - name: Run unit tests
        run: cargo test --lib --bins

      - name: Run unit tests (verbose, on failure)
        if: failure()
        run: cargo test --lib --bins -- --nocapture

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            .
            zeaking
            api-server

      - name: Run integration tests (if Zebra available)
        env:
          ZEBRA_RPC_URL: ${{ secrets.ZEBRA_RPC_URL || 'http://127.0.0.1:8232' }}
        run: |
          echo "⚠️  Integration tests require a Zebra node"
          echo "These tests are marked with #[ignore] and won't run in CI unless Zebra is available"
          cargo test --test integration_tests -- --ignored || echo "Integration tests skipped (Zebra not available)"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            .
            zeaking
            api-server

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # Soft-fail: open RUSTSEC on transitive rustls-webpki / ecosystem until lockfile upgrades land.
      - name: Run security audit
        run: cargo audit || echo "Security audit found issues - see Dependabot alerts"
        continue-on-error: true

  cargo-chec:
    name: Cargo chec (parallel checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            .
            zeaking
            api-server

      - name: Install cargo-chec
        run: cargo install cargo-chec --locked

      - name: Run cargo-chec (parallel checks)
        run: cargo chec || echo "Some checks failed - see output above"
        continue-on-error: true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            .
            zeaking
            api-server

      - name: Build CLI
        run: cargo build --release --bin nozy

      - name: Build API Server
        run: cargo build --release --package nozywallet-api

