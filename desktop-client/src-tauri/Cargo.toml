[package]
name = "nozy-wallet-desktop"
version = "1.0.0"
description = "NozyWallet Desktop Application"
authors = ["LEONINE-DAO"]
license = "MIT"
repository = "https://github.com/LEONINE-DAO/Nozy-wallet"
edition = "2021"

[lib]
name = "nozy_wallet_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
tauri = { version = "2.0", features = [] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
thiserror = "1.0"
lazy_static = "1.4"
hex = "0.4"
sha2 = "0.10"

# Zcash dependencies for wallet and address generation
orchard = "0.11.0"
zcash_primitives = "0.24.1"
zcash_protocol = "0.6.2"

# Use the NozyWallet library from parent directory
nozy = { path = "../../" }

[features]
# This feature is used for production builds or when `devPath` points to the filesystem
custom-protocol = ["tauri/custom-protocol"]
